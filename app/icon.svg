<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Hard hat shape -->
  <g transform="translate(256,240)">
    <!-- Hat dome -->
    <path d="M-120,20 Q-120,-80 0,-100 Q120,-80 120,20 Z" fill="#ffffff" opacity="0.95"/>
    <!-- Hat brim -->
    <rect x="-140" y="16" width="280" height="32" rx="8" fill="#ffffff"/>
    <!-- Center ridge on hat -->
    <rect x="-8" y="-90" width="16" height="80" rx="4" fill="#1d4ed8" opacity="0.3"/>
  </g>
  <!-- Building blocks below hat -->
  <g fill="#ffffff" opacity="0.6">
    <rect x="136" y="310" width="72" height="52" rx="6"/>
    <rect x="220" y="310" width="72" height="52" rx="6"/>
    <rect x="304" y="310" width="72" height="52" rx="6"/>
    <rect x="178" y="372" width="72" height="52" rx="6"/>
    <rect x="262" y="372" width="72" height="52" rx="6"/>
  </g>
</svg>
